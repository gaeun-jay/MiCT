<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>관리자 로그인 · Python 과제 관리 시스템</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../admin.css" />
  </head>
  <body class="login-page">
    <form class="login-card" id="loginForm">
      <div class="login-logo">Py</div>
      <h1>관리자 로그인</h1>
      <p class="subtitle">Python 과제 관리 시스템</p>

      <div class="field">
        <label for="adminId">관리자 아이디</label>
        <input
          class="input"
          type="text"
          id="adminId"
          name="adminId"
          placeholder="admin 또는 이메일"
          autocomplete="username"
          required
        />
      </div>

      <p class="error-text" id="adminError" role="alert" hidden
         style="color:#dc2626;font-size:13px;margin:-6px 0 12px;"></p>

      <div class="field">
        <label for="adminPw">비밀번호</label>
        <input
          class="input"
          type="password"
          id="adminPw"
          name="adminPw"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <button class="btn btn-primary btn-block" type="submit">로그인</button>

      <p class="login-hint">
        관리자 계정으로만 접근할 수 있습니다.
      </p>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../../supabase-config.js"></script>
    <script src="login.js"></script>
  </body>
</html>

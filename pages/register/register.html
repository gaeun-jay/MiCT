<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | Python Coding Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../design-system.css?v=2">
<link rel="stylesheet" href="../i18n.css">
<link rel="stylesheet" href="register.css">
</head>
<body>

  <div class="lang-float" data-lang-toggle></div>

  <main class="center-screen">
    <form class="glass-card register-card" id="regForm" autocomplete="on" novalidate>
      <h1 class="reg-title" data-i18n="reg_title">Create your account</h1>

      <div class="reg-grid">
        <label class="reg-field">
          <span class="reg-label" data-i18n="reg_first">First name</span>
          <input class="field-input" id="firstName" type="text" autocomplete="given-name" required>
        </label>
        <label class="reg-field">
          <span class="reg-label" data-i18n="reg_last">Last name</span>
          <input class="field-input" id="lastName" type="text" autocomplete="family-name" required>
        </label>

        <label class="reg-field">
          <span class="reg-label" data-i18n="reg_age">Age group</span>
          <select class="field-input" id="ageGroup" required>
            <option value="" data-i18n="reg_age_ph">Select</option>
            <option value="10-19">10–19</option>
            <option value="20-29">20–29</option>
            <option value="30-39">30–39</option>
            <option value="40-49">40–49</option>
            <option value="50-59">50–59</option>
            <option value="60-69">60–69</option>
            <option value="70-79">70–79</option>
            <option value="80-89">80–89</option>
          </select>
        </label>
        <label class="reg-field">
          <span class="reg-label" data-i18n="reg_id">ID</span>
          <input class="field-input" id="regId" type="text" placeholder="Choose an ID" data-i18n-ph="reg_id_ph" autocomplete="username" required>
        </label>

        <label class="reg-field reg-field--wide">
          <span class="reg-label" data-i18n="reg_pw">Password</span>
          <div class="field-control">
            <input class="field-input" id="regPw" type="password" placeholder="8+ chars, letters & numbers" data-i18n-ph="reg_pw_ph" autocomplete="new-password" required>
            <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password" data-i18n-aria="show_password" aria-pressed="false">
              <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 8 10 8a18.5 18.5 0 0 1-2.16 3.19M6.61 6.61A18.45 18.45 0 0 0 2 12s3 8 10 8a9.12 9.12 0 0 0 5.39-1.61"/>
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
              </svg>
              <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3-8 10-8 10 8 10 8-3 8-10 8-10-8-10-8Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </label>
      </div>

      <p class="error-text reg-error" id="regError" role="alert" hidden></p>

      <button type="submit" class="btn-green" id="regBtn" data-i18n="reg_submit">Register</button>
      <a class="reg-login-link" href="../login/login.html" data-i18n="reg_have_account">Already have an account? Log in</a>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../supabase-config.js"></script>
  <script src="../i18n.js?v=4"></script>
  <script src="register.js?v=1"></script>
</body>
</html>

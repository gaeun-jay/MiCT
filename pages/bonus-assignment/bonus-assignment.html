<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bonus | Python Coding Practice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../design-system.css">
<link rel="stylesheet" href="../assignment/assignment.css?v=2">
<link rel="stylesheet" href="../i18n.css">
<link rel="stylesheet" href="bonus-assignment.css">
</head>
<body>

  <main class="ps-wrap">
    <section class="ps-card glass-card">

      <header class="ps-topbar">
        <div class="pill pill--time" id="timer">Time 00:00</div>
        <h1 class="ps-title" id="psTitle">Variables</h1>
        <div class="ps-actions">
          <div data-lang-toggle></div>
          <div class="pill pill--time" id="psCount" data-i18n="questions_word">Questions</div>
          <button type="button" class="pill pill--start" id="startBtn" data-i18n="start">Start</button>
        </div>
      </header>

      <div class="ps-scroll" id="psScroll">
        <div class="ps-starthint" id="startHint">
          <p data-i18n-html="start_hint_1">Press <b>Start</b> to begin the timer and unlock the questions.</p>
          <p class="ps-startsub" data-i18n="bonus_start_hint_2">Bonus assignments have no difficulty selection. 15 questions per concept (OX · Fill-in · Matching).</p>
        </div>
        <div class="ps-questions is-locked" id="questions" aria-hidden="true"></div>
      </div>

      <footer class="ps-bottom">
        <span class="ps-savenote" id="saveNote"></span>
        <button type="button" class="pill pill--submit" id="submitBtn" data-i18n="submit" disabled>Submit</button>
      </footer>

    </section>
    <a class="ps-back" href="../bonus/bonus.html" data-i18n="back_to_bonus">← Back to Bonus</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../supabase-config.js"></script>
  <script src="../i18n.js?v=2"></script>
  <script src="bonus-assignment.js?v=4"></script>
</body>
</html>
